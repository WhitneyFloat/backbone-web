<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sparkle Clean Co. Inventory Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
            extend: {
                colors: {
                "primary": "#ff6b6b", // Coral
                "secondary": "#ffe66d", // Sunny Yellow
                "accent": "#4ecdc4", // Mint Green
                "background-light": "#fef8f4", 
                "background-dark": "#230f0f",
                "surface-light": "#ffffff",
                "surface-dark": "#2d1a1a",
                "text-main": "#1d0c0c",
                "text-sub": "#6b4c4c",
                },
                fontFamily: {
                "display": ["Plus Jakarta Sans", "sans-serif"]
                },
                borderRadius: {
                "DEFAULT": "0.5rem",
                "lg": "1rem",
                "xl": "1.5rem",
                "2xl": "2rem",
                "full": "9999px"
                },
                boxShadow: {
                    "soft": "0 4px 20px -2px rgba(255, 107, 107, 0.08)",
                    "card": "0 2px 12px -2px rgba(29, 12, 12, 0.05)"
                }
            },
            },
        }
    </script>
<style>
    body { min-height: 100vh; margin: 0; padding: 0; }
</style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-text-main antialiased">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden pb-24">
<header class="flex items-center justify-between px-6 pt-8 pb-4 bg-background-light dark:bg-background-dark sticky top-0 z-20">
<div class="flex items-center gap-3">
<div class="flex h-10 w-10 items-center justify-center rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined">cleaning_services</span>
</div>
<h1 class="text-xl font-bold tracking-tight text-text-main dark:text-white">Sparkle Clean Co. ✨</h1>
</div>
<button class="flex h-10 w-10 items-center justify-center rounded-full bg-white dark:bg-surface-dark shadow-card text-text-main dark:text-white transition hover:bg-primary/5">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<div class="px-6 pb-4">
<div class="group flex w-full items-center rounded-2xl bg-white dark:bg-surface-dark shadow-card px-4 py-3 transition-all focus-within:ring-2 focus-within:ring-primary/50">
<span class="material-symbols-outlined text-text-sub mr-3">search</span>
<input class="h-full w-full bg-transparent text-base font-medium text-text-main placeholder-text-sub/70 outline-none border-none focus:ring-0 p-0" placeholder="Search inventory..." type="text"/>
<button class="ml-2 rounded-lg p-1 text-primary hover:bg-primary/10">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">filter_list</span>
</button>
</div>
</div>
<div class="flex gap-3 overflow-x-auto px-6 pb-6 hide-scrollbar">
<button class="flex shrink-0 items-center justify-center rounded-full bg-primary px-5 py-2 text-sm font-semibold text-white shadow-soft">All Items</button>
<button class="flex shrink-0 items-center justify-center rounded-full bg-white dark:bg-surface-dark px-5 py-2 text-sm font-semibold text-text-sub shadow-card transition active:scale-95 hover:bg-primary/5 dark:text-gray-300">Low Stock</button>
<button class="flex shrink-0 items-center justify-center rounded-full bg-white dark:bg-surface-dark px-5 py-2 text-sm font-semibold text-text-sub shadow-card transition active:scale-95 hover:bg-primary/5 dark:text-gray-300">Cleaning Agents</button>
<button class="flex shrink-0 items-center justify-center rounded-full bg-white dark:bg-surface-dark px-5 py-2 text-sm font-semibold text-text-sub shadow-card transition active:scale-95 hover:bg-primary/5 dark:text-gray-300">Tools</button>
</div>
<div class="grid grid-cols-3 gap-4 px-6 pb-8">
<div class="flex flex-col gap-1 rounded-2xl bg-white dark:bg-surface-dark p-5 shadow-card">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary text-[20px]">inventory_2</span>
<p class="text-xs font-bold uppercase tracking-wider text-text-sub/80">Total</p>
</div>
<p class="text-3xl font-extrabold text-text-main dark:text-white">1,240</p>
<p class="text-xs font-medium text-accent">+24 this week</p>
</div>
<div class="flex flex-col gap-1 rounded-2xl bg-secondary p-5 shadow-card">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-text-main text-[20px]">warning</span>
<p class="text-xs font-bold uppercase tracking-wider text-text-main/80">Low Stock</p>
</div>
<p class="text-3xl font-extrabold text-text-main">12</p>
<p class="text-xs font-bold text-text-main opacity-80">Needs attention</p>
</div>
<div class="flex flex-col gap-1 rounded-2xl bg-white dark:bg-surface-dark p-5 shadow-card">
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-accent text-[20px]">attach_money</span>
<p class="text-xs font-bold uppercase tracking-wider text-text-sub/80">Value</p>
</div>
<p class="text-3xl font-extrabold text-text-main dark:text-white">$15k</p>
<p class="text-xs font-medium text-text-sub">Current assets</p>
</div>
</div>
<div class="flex items-center justify-between px-6 pb-4">
<h2 class="text-lg font-bold text-text-main dark:text-white">Inventory List</h2>
</div>
<div class="grid grid-cols-2 gap-4 px-6 pb-6">
<div class="group relative flex flex-col gap-4 rounded-2xl bg-white dark:bg-surface-dark p-4 shadow-card transition-all hover:shadow-soft">
<div class="flex items-start gap-4">
<div class="flex h-14 w-14 shrink-0 items-center justify-center rounded-xl bg-accent/10 text-accent">
<span class="material-symbols-outlined text-[28px]">sanitizer</span>
</div>
<div class="flex flex-1 flex-col">
<h3 class="text-[15px] font-bold text-text-main dark:text-white">Multi-Surface Cleaner</h3>
<div class="mt-3 flex items-center justify-between">
<span class="text-lg font-semibold text-text-main dark:text-white">24 btls</span>
<div class="h-2 w-24 rounded-full bg-gray-100 dark:bg-gray-700 overflow-hidden">
<div class="h-full w-3/4 rounded-full bg-accent"></div>
</div>
</div>
</div>
</div>
</div>
<div class="group relative flex flex-col gap-4 rounded-2xl bg-white dark:bg-surface-dark p-4 shadow-card border-l-4 border-secondary transition-all hover:shadow-soft">
<div class="flex items-start gap-4">
<div class="flex h-14 w-14 shrink-0 items-center justify-center rounded-xl bg-secondary/20 text-text-main">
<span class="material-symbols-outlined text-[28px]">dry_cleaning</span>
</div>
<div class="flex flex-1 flex-col">
<h3 class="text-[15px] font-bold text-text-main dark:text-white">Microfiber Cloths</h3>
<div class="mt-3 flex items-center justify-between">
<span class="text-lg font-semibold text-text-main dark:text-white">5 pks</span>
<div class="h-2 w-24 rounded-full bg-gray-100 dark:bg-gray-700 overflow-hidden">
<div class="h-full w-[15%] rounded-full bg-secondary"></div>
</div>
</div>
</div>
</div>
</div>
</div>
</div>
</body></html>
