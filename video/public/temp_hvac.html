    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { charcoal: '#1a1d29', blue: '#00d4ff', grey: '#b8c5d6' } } } } }

    <style>
        body {
            background: #1a1d29;
